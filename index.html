    <p id="random-text">Please report any bugs on the GitHub page!</p>

    <script>
        const randomText = document.getElementById('random-text');
        const messages = [
            "Please report any bugs on the GitHub page!",
            "Mostly bug-free!",
            "giveHugs(64);",
            "swaus"
        ];

        const fadeDuration = 500;
        const changeInterval = 4000;

        function changeText() {
            randomText.style.transition = `opacity ${fadeDuration}ms`;
            randomText.style.opacity = 0;

            setTimeout(() => {
                let newMessage;
                do {
                    newMessage = messages[Math.floor(Math.random() * messages.length)];
                } while (newMessage === randomText.textContent);

                randomText.textContent = newMessage;

                randomText.style.opacity = 1;
            }, fadeDuration);
        }

        setInterval(changeText, changeInterval);
    </script>
