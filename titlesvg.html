<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Joalor64's Modbox - Title SVG Generator</title>
    <meta name='author' content='Joalor64'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/titlesvg.css">
    <link rel="icon" href="favicon.png" type="image/x-icon" />
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joalor64gh.github.io/Modbox">
    <meta property="og:title" content="Joalor64's Modbox">
    <meta property="og:description" content="A collection of tools for Incredibox modding.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Joalor64GH/Modbox/main/favicon.png">
    <meta data-react-helmet="true" name="theme-color" content="#f5a918">
</head>

<body>
    <div class="back-button" onclick="window.location.href='index.html'">⏴Back</div>
    <h1>Title SVG Generator</h1>
    <div class="tool-container">
        <div class="generator">
            <label>
                Title text:
                <input id="titleText" type="text" placeholder="Mod Title" value="Incredibox">
            </label>
            <label> // Add music notes: <input type="checkbox" id="notesToggle"></label>
            <label>
                Size:
                <input type="range" id="sizeSlider" min="0.5" max="4" step="0.01" value="1">
                <span id="sizeValue">1.00×</span>
            </label>
            <div class="preview">
                <div id="previewWrapper">
                    <svg id="previewSvg" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
                        <g id="svgContent"></g>
                    </svg>
                </div>
            </div>
            <button onclick="exportSVGs()">Export SVG + CSS</button>
            <h3>Generated CSS</h3>
            <pre id="cssOutput"></pre>
        </div>
    </div>
    <script src="js/titlesvg.js"></script>
    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</div>
    <script src="js/script.js"></script>
</body>

</html>
