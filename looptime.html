<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Joalor64's Modbox - Looptime + Totalframe Finder</title>
    <meta name='author' content='Joalor64'>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/looptime.css">
    <link rel="icon" href="favicon.png" type="image/x-icon" />
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://joalor64.github.io/Modbox">
    <meta property="og:title" content="Joalor64's Modbox">
    <meta property="og:description" content="A collection of tools for Incredibox modding.">
    <meta property="og:image" content="https://raw.githubusercontent.com/Joalor64/Modbox/main/favicon.png">
    <meta data-react-helmet="true" name="theme-color" content="#f5a918">
</head>

<body>
    <div class="back-button" onclick="window.location.href='index.html'">⏴Back</div>
    <h1>Looptime + Totalframe Finder</h1>
    <div class="container">
        <p align="center">Note: You might need less or more frames so the totalframe amount is actually
            correct.<br>Also, you might have to use the amount of frames in your FLA project instead of what is shown
            here.</p>
        <img id="example-img" src="img/exampleImage.png">
        <hr>
        <input class="input" type="text" placeholder="BPM" id="bpminput">
        <input class="input" type="text" placeholder="Looptime in ms (MS to BPM)" id="looptimeinput">
        <input class="input" type="text" placeholder="Beats per loop (Optional)" id="beatsloopinput">
        <button class="button" id="submit-button">Submit</button>
        <h3 id="results-text"></h3>
    </div>
    <div id="imgModal">
        <span id="closeModal">&times;</span>
        <img id="modalImage" src="">
    </div>
    <script src="js/looptime.js"></script>
    <div class="theme-toggle" id="theme-toggle" onclick="toggleTheme()">☀️</div>
    <script src="js/script.js"></script>
</body>

</html>
